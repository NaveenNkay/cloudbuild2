steps:
  # Build the Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/my-python-app:$SHORT_SHA
      - .

  # Push the image to GCR
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/my-python-app:$SHORT_SHA

images:
  - gcr.io/$PROJECT_ID/my-python-app:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY